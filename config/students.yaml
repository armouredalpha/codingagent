  - level: medium
    skills:
      - "ROS2 publishers and subscribers"
      - "ROS2 service clients and servers"
      - "Launch files"
      - "Custom message/service definitions"
      - "Debugging ROS2 communication"
    ros2_experience: intermediate
  - level: hard
    skills:
      - "Nav2 navigation stack"
      - "TF2 coordinate transformations"
      - "URDF robot descriptions"
      - "robot_state_publisher"
      - "Multi-node system integration"
    ros2_experience: advanced
