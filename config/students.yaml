# Baseline student skill profiles used by the confidence scorer to judge whether
# a candidate at each level could solve a generated question. Loaded automatically
# by the v2 generate flow (no CLI flag).
students:
  - level: easy
    skills:
      - "Linux command line basics"
      - "Python fundamentals"
      - "ROS2 node creation"
      - "Running ROS2 nodes with ros2 run"
